# Bundles composed from other mothers. Each entry.resource is a oneOf over every FHIR resource,
# so the composed mother carries its own $type to say which one this entry is.

# A minimal bundle: one patient and one observation.
aPatientBundle:
  $type: Bundle
  resourceType: Bundle
  type: collection
  entry:
    - resource: { $mother: aFemalePatient }
    - resource: { $mother: aBodyWeight }

# A vital-signs panel: one patient and the four vital-sign observations.
aVitalsBundle:
  $type: Bundle
  resourceType: Bundle
  type: collection
  entry:
    - resource: { $mother: aMalePatient }
    - resource: { $mother: aBodyWeight }
    - resource: { $mother: aBodyHeight }
    - resource: { $mother: aBodyTemperature }
    - resource: { $mother: aBloodPressure }

# An oncology case: a patient, a cancer diagnosis (Condition), a tumour-marker result and a weight.
anOncologyBundle:
  $type: Bundle
  resourceType: Bundle
  type: collection
  entry:
    - resource: { $mother: aFemalePatient }
    - resource: { $mother: aBreastCancerDiagnosis }
    - resource: { $mother: aTumourMarker }
    - resource: { $mother: aBodyWeight }