# Adjusting a mother at invocation time. An override REPLACES a whole field (no deep merge),
# so the ease depends on the field's shape:
- { $mother: aBodyWeight }                                    # the mother as defined: 72 kg, final

# scalar override — trivial:
- { $mother: aBodyWeight, status: preliminary }

# single nested object override — replace the whole Quantity:
- { $mother: aBodyWeight, valueQuantity: { value: 80, unit: kg } }

# array override — there is no "append": to add a category you restate the whole list.
# This is why arrays are best handled by composing small sub-mothers rather than deep editing.
- $mother: aBodyWeight
  category:
    - { text: Vital Signs }
    - { text: Survey }
