# Each entry assembles a Bundle. Reuse a bundle mother as-is, or puzzle a custom one together by
# overriding `entry` with whichever resources the scenario needs.
- { $mother: aPatientBundle }   # minimal: patient + body weight
- { $mother: aVitalsBundle }    # full vital-signs panel
- { $mother: anOncologyBundle }    # cancer patient: diagnosis + tumour marker + weight

# A one-off custom bundle, puzzled together inline: a male patient with just weight and temperature.
- $mother: aPatientBundle
  entry:
    - resource: { $mother: aMalePatient }
    - resource: { $mother: aBodyWeight }
    - resource: { $mother: aBodyTemperature }
